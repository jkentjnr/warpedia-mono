<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Browse · Warpedia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="colors_and_type.css">
  <style>html, body { margin: 0; background: var(--paper); color: var(--ink); }</style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="site-chrome.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    function App() {
      return (
        <>
          <TopBar current="browse" />
        <main style={{ padding: '32px 40px 64px', maxWidth: 1180, margin: '0 auto' }}>
          <Breadcrumb trail={['Home', 'Browse']} />
          <h1 className="wp-display-l" style={{ marginBottom: 12 }}>Browse the catalogue</h1>
          <p style={{ fontFamily: 'var(--serif)', fontSize: 17, lineHeight: '26px', color: 'var(--ink-2)', maxWidth: '64ch', margin: '0 0 32px' }}>
            142,418 items across 38 conflicts. Start here, or jump straight to one of the seven entity types.
          </p>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 14 }}>
            {[
              [ROUTES.conflicts, 'Conflicts',  '38',     'From the Boer Wars to ongoing operations'],
              [ROUTES.people,    'People',     '38,704', 'Subjects of the catalogue — soldiers, civilians, photographers'],
              [ROUTES.places,    'Places',     '12,940', 'Battlefields, hospitals, ports, camps, cities'],
              [ROUTES.equipment, 'Equipment',  '4,118',  'Aircraft, vehicles, small arms, ships, instruments'],
              [ROUTES.themes,    'Themes',     '142',    'Cross-conflict editorial readings'],
            ].map(([href, label, n, desc]) => (
              <a key={href} href={href} className="wp-card-catalogue" style={{ textDecoration: 'none', color: 'inherit', background: 'var(--paper-3)', display: 'block' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 8 }}>
                  <div style={{ fontFamily: 'var(--serif)', fontSize: 22, color: 'var(--ink)', fontWeight: 500 }}>{label}</div>
                  <div style={{ fontFamily: 'var(--serif)', fontSize: 18, color: 'var(--ink-3)', fontFeatureSettings: '"tnum" 1' }}>{n}</div>
                </div>
                <div className="wp-meta">{desc}</div>
              </a>
            ))}
          </div>
        </main>
        <Footer />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
