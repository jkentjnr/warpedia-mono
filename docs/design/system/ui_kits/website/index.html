<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Warpedia · website UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>html,body{min-height:100%;}body{background:var(--paper);}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" data-presets="react">
function App(){
  const [view, setView] = React.useState('home');
  const [item, setItem] = React.useState(null);
  const onNav = (v, payload) => { if (v === 'item') setItem(payload); setView(v); window.scrollTo(0,0); };
  return (
    <React.Fragment>
      <TopBar onNav={onNav} current={view} />
      {view === 'home'       && <HomeHero onNav={onNav} />}
      {view === 'browse'     && <Browse onNav={onNav} />}
      {view === 'item'       && <ItemView item={item} onNav={onNav} />}
      {view === 'conflicts'  && <Article onNav={onNav} />}
      {view === 'themes'     && <Article onNav={onNav} />}
      {view === 'about'      && <Article onNav={onNav} />}
      <Footer />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
