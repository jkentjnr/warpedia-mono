<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>body{margin:0;padding:22px;background:var(--paper);max-width:560px;}
.field{margin-bottom:12px;}
</style></head>
<body>
  <div class="field">
    <label class="wp-label">Title</label>
    <input class="wp-input" value="Letter from Pte. J. H. Smith to his mother, 3 July 1916" />
    <div class="wp-help">Auto-suggested from filename. You can edit it freely.</div>
  </div>
  <div class="field">
    <label class="wp-label">Date written</label>
    <input class="wp-input" placeholder="1916-07-03 · c. July 1916 · summer 1916" />
  </div>
</body></html>
