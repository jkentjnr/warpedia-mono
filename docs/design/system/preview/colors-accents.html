<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Colors · Accents</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>body{margin:0;padding:22px;background:var(--paper);}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px;}
.sw{height:64px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;color:#F8F4EC;}
.n{font-family:var(--sans);font-size:12px;font-weight:600;}
.h{font-family:var(--mono);font-size:11px;opacity:.85;}
.use{font-family:var(--sans);font-size:11px;color:var(--ink-3);grid-column:1/-1;margin-top:2px;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#A8412A"><span class="n">oxide</span><span class="h">#A8412A</span></div>
    <div class="sw" style="background:#7C2F1F"><span class="n">oxide-deep</span><span class="h">#7C2F1F</span></div>
    <div class="sw" style="background:#4A6856"><span class="n">verdigris</span><span class="h">#4A6856</span></div>
    <div class="sw" style="background:#3D556B"><span class="n">iron</span><span class="h">#3D556B</span></div>
    <div class="use">Oxide: links + primary CTA · Verdigris: approved/OPEN · Iron: info · Caution below</div>
  </div>
  <div class="row">
    <div class="sw" style="background:#314838"><span class="n">verdigris-deep</span><span class="h">#314838</span></div>
    <div class="sw" style="background:#283A4A"><span class="n">iron-deep</span><span class="h">#283A4A</span></div>
    <div class="sw" style="background:#8B6914"><span class="n">caution</span><span class="h">#8B6914</span></div>
    <div class="sw" style="background:#5E460D"><span class="n">caution-deep</span><span class="h">#5E460D</span></div>
  </div>
</body></html>
