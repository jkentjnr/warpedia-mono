<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Badges & Status</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>body{margin:0;padding:22px;background:var(--paper);}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.lbl{font-family:var(--mono);font-size:11px;color:var(--ink-3);width:80px;}
</style></head>
<body>
  <div class="row"><span class="lbl">licence</span>
    <span class="wp-badge wp-badge-open">Open</span>
    <span class="wp-badge wp-badge-open-sa">Open · SA</span>
    <span class="wp-badge wp-badge-nc">NC</span>
    <span class="wp-badge wp-badge-link-only">Link only</span>
  </div>
  <div class="row"><span class="lbl">status</span>
    <span class="wp-status wp-status-published">Published</span>
    <span class="wp-status wp-status-review">In review</span>
    <span class="wp-status wp-status-approved">Approved</span>
    <span class="wp-status wp-status-flagged">Sensitivity flag</span>
    <span class="wp-status wp-status-draft">Draft</span>
  </div>
</body></html>
