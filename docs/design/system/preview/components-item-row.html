<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Item row · list</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>body{margin:0;padding:22px;background:var(--paper);}
.list{}
.row{display:grid;grid-template-columns:24px 1fr 90px 90px;gap:12px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--ink-rule);transition:background 150ms;}
.row:hover{background:rgba(26,23,20,0.04);}
.icon{font-family:var(--mono);font-size:11px;color:var(--ink-3);text-align:center;text-transform:uppercase;letter-spacing:0.06em;}
.t{font-family:var(--serif);font-weight:500;color:var(--ink);font-size:15px;}
.m{font-family:var(--sans);font-size:12px;color:var(--ink-3);font-feature-settings:"tnum" 1;}
</style></head>
<body>
  <div class="list">
    <div class="row"><span class="icon">LET</span><span class="t">Letter to mother, 3 July 1916</span><span class="m">1916-07-03</span><span><span class="wp-badge wp-badge-open-sa">SA</span></span></div>
    <div class="row"><span class="icon">PHO</span><span class="t">Group photograph, 1st Bn AIF, Pozières</span><span class="m">1916-07</span><span><span class="wp-badge wp-badge-open">Open</span></span></div>
    <div class="row"><span class="icon">DIA</span><span class="t">Diary entry, 1 July 1916</span><span class="m">1916-07-01</span><span><span class="wp-badge wp-badge-nc">NC</span></span></div>
    <div class="row"><span class="icon">DOC</span><span class="t">Casualty notification telegram</span><span class="m">1916-07-09</span><span><span class="wp-badge wp-badge-link-only">Link</span></span></div>
  </div>
</body></html>
