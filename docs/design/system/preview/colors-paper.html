<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Colors · Paper</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>body{margin:0;padding:22px;background:var(--paper);}
.swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.sw{height:84px;border:1px solid var(--ink-rule);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
.n{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--ink);}
.h{font-family:var(--mono);font-size:11px;color:var(--ink-3);}
</style></head>
<body>
  <div class="swatches">
    <div class="sw" style="background:#F8F4EC"><span class="n">paper</span><span class="h">#F8F4EC</span></div>
    <div class="sw" style="background:#F1EAD9"><span class="n">paper-2</span><span class="h">#F1EAD9</span></div>
    <div class="sw" style="background:#E7DCC4"><span class="n">paper-3</span><span class="h">#E7DCC4</span></div>
    <div class="sw" style="background:#DDCFB1"><span class="n">paper-4</span><span class="h">#DDCFB1</span></div>
  </div>
</body></html>
