<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>body{margin:0;padding:22px;background:var(--paper);}
.row{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.bar{height:14px;background:var(--oxide);}
.lbl{font-family:var(--mono);font-size:11px;color:var(--ink-3);width:84px;}
</style></head>
<body>
  <div class="row"><span class="lbl">sp-1 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="lbl">sp-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="lbl">sp-3 · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="lbl">sp-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="lbl">sp-6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="lbl">sp-8 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="lbl">sp-12 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="lbl">sp-16 · 64</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="lbl">sp-24 · 96</span><div class="bar" style="width:96px"></div></div>
</body></html>
