<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Colors · Ink</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>body{margin:0;padding:22px;background:var(--paper);}
.swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.sw{height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;color:#F8F4EC;}
.n{font-family:var(--sans);font-size:12px;font-weight:600;}
.h{font-family:var(--mono);font-size:11px;opacity:.75;}
.lt{color:#1A1714;}
</style></head>
<body>
  <div class="swatches">
    <div class="sw" style="background:#1A1714"><span class="n">ink</span><span class="h">#1A1714</span></div>
    <div class="sw" style="background:#3F3A33"><span class="n">ink-2</span><span class="h">#3F3A33</span></div>
    <div class="sw lt" style="background:#6B6359"><span class="n">ink-3</span><span class="h">#6B6359</span></div>
    <div class="sw lt" style="background:#9C9388"><span class="n">ink-4</span><span class="h">#9C9388</span></div>
    <div class="sw lt" style="background:#D8CDB6"><span class="n">ink-rule</span><span class="h">#D8CDB6</span></div>
    <div class="sw lt" style="background:#C3B698"><span class="n">ink-rule-2</span><span class="h">#C3B698</span></div>
  </div>
</body></html>
